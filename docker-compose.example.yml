services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=REPLACE_WITH_YOUR_PASSWORD
      - POSTGRES_DB=n8n
    volumes:
      - db_storage:/var/lib/postgresql/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=REPLACE_WITH_YOUR_PASSWORD
      - N8N_METRICS=true
      - N8N_SECURE_COOKIE=true
      # Replace with your domain, or remove if running locally
      - WEBHOOK_URL=https://your-domain.com/
    volumes:
      - n8n_storage:/home/node/.n8n
      - shared_tmp:/tmp/jobsignal
    depends_on:
      - db

  cv-renderer:
    build:
      context: .
      dockerfile: scripts/Dockerfile.cv-renderer
    restart: always
    volumes:
      - shared_tmp:/tmp/jobsignal
      - ./scripts:/opt/jobsignal
    expose:
      - "3456"

  # Self-hosted only — requires 2GB+ RAM to run alongside cv-renderer
  jobspy-scanner:
    build:
      context: .
      dockerfile: scripts/Dockerfile.jobspy
    restart: always
    expose:
      - "3457"

volumes:
  db_storage:
  n8n_storage:
  caddy_data:
  caddy_config:
  shared_tmp: